<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="icon" type="image/png" href="images/icon.png">
		<title>ggliv's website</title>
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-BmbxuPwQa2lc/FVzBcNJ7UAyJxM6wuqIj61tLrc4wSX0szH/Ev+nYRRuWlolflfl" crossorigin="anonymous">
		<style>
			html, body {
        		height:100%;
        		margin:0;
			}
			body {
				background-color:#f5f5f5;
				font-family: Arial, Helvetica, sans-serif;
			}
			.flex {
				display:flex;
				flex-direction:column;
				justify-content:center;
				align-items:center;
				text-align:center;
				height:100%;
				width:100%;
			}
			.flex * {
				margin-left:1em;
				margin-right:1em;
			}
			.pfp {
				border-radius:50% 50% 50% 50%;
				height:15em;
				width:15em;
			}
			.ulanim {
				position:relative;
				font-weight:bold;
				cursor:default;
			}
			.ulanim::after {
				border-radius:1em;
				border-top:.1em solid #2F56B0;
				content:"";
				position:absolute;
				right:100%;
				bottom:.15em;
				left:0;
				transition:right .5s cubic-bezier(0,.5,0,1);
			}
			.ulanim:hover::after {
				right:0;
			}
			.link-icons {
				display:flex;
			}
			.link-icons img {
				width:3.5em;
				height:3.5em;
			}
			.link-icons * {
				margin:0.15em;
			}
		</style>
	</head>

	<body>

			</div>
		</div>
