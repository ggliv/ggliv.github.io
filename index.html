<!doctype html>
<html lang="en">
<head>
	<title>gabe's site</title>
	<link href="https://fonts.googleapis.com/css?family=Fredoka%20One" rel="stylesheet">
	<meta name="theme-color" content="#673AB6"/>
	<meta property="og:title" content="ggliv's site"/>
	<meta property="og:type" content="website"/>
	<meta property="og:url" content="https://ggliv.com"/>
	<meta property="og:image" content="https://github.com/ggliv.png"/>

	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<style>
		html, body {
			margin: 0;
			height: 100%;
			min-height: 100%;
		}

		.colorbar {
			background-color: #282ed8;
			height: 1%;
		}

		body {
			/* i get to make the rules and i say ~mandatory~ dark mode */
			background-color: #0d1117;
			color: #c9d1d9;
		}
		
		.content {
			display: flex;
			align-items: center;
			justify-content: center;
			height: 99%;
			flex-direction: column;
		}

		.content > h1 {
			font-family: "Fredoka One";
		}

		/*<stolen href="https://codepen.io/w3resource/pen/PoJMLQb">*/
		.yoyo {
			display: inline-block;
			position: relative;
		}

		.yoyo:after {
			content: "";
			position: absolute;
			width: 100%;
			transform: scaleX(0);
			height: 2px;
			bottom: 0;
			left: 0;
			background-color: #5294e2;
			transform-origin: bottom right;
			transition: transform 0.25s ease-out;
		}

		.yoyo:hover:after {
			 transform: scaleX(1);
			 transform-origin: bottom left;
		}
		/*</stolen>*/

		.content > p {
			font-family: Arial, Helvetica, sans-serif;
			margin: 0;
		}

		.linklist {
			display: inline-flex;
			flex-direction: row;
		}

		.linklist > * {
			flex: 1;
			margin: 10px;
		}

		.linklist > a {
			font-family: Arial, Helvetica, sans-serif;
			color: #5186ca;
			transition: color 500ms ease-out 100ms
		}

		.linklist > a:hover {
			color: #5951ca;
		}

		footer {
			position: fixed;
			bottom: 0;
			font-size: 50%;
			text-align: center;
			color: #242629;
			user-select: none;
		}
	</style>
</head>

<body>
	<div class="colorbar"></div>

	<div class="content">
		<h1>
			<span class="yoyo">yoyo.</span>
			<br>
			i'm gabe.
		</h1>

			here's where you can find me on the web
		</p>
		<div class="linklist">

		</div>
	</div>

	<footer>

</body>
</html>
