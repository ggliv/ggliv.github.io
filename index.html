    <div class="self-intro">
      <img src="images/profile_small.png" alt="profile shot of gabe livengood" width="320" height="320">
      <div class="name-tag">
        <script>
          {
            let greetings = ["Hey", "Howdy", "Sup", "Hi", "Yo", "Hello", "Heya"]
            let h = new Date().getHours()
            if (5 <= h && h <= 11) {
              greetings.push("Morning")
            } else if (12 <= h && h <= 17) {
              greetings.push("Afternoon")
            } else if (18 <= h && h <= 23) {
              greetings.push("Evening")
            }
            window.addEventListener("load", () =>
              document.getElementById("greeting").innerText = greetings[Math.floor(Math.random() * greetings.length)]
            )
          }
        </script>
        <p><span id="greeting"><noscript>Hey</noscript></span>, I'm</p>
        <b>Gabe Livengood</b>
      </div>
      <div class="username-container">
        <div class="username-bg"><b>(@ggliv)</b></div>
      </div>
    </div>
